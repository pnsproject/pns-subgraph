specVersion: 0.0.2
description: pns-subgraph 
repository: https://github.com/pnsproject/pns-subgraph
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: Domain
    network: mainnet
    source:
      address: "0x4A5Eb5E67Bc88aB728354CDCDC88De4BE200320B"
      abi: IController
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.4
      language: wasm/assemblyscript
      entities:
        - Domain
      abis:
        - name: IController
          file: ./build/contracts/IController.json
      eventHandlers:
        - event: NameRegistered(string,indexed uint256,indexed address,uint256,uint256)
          handler: handleNameRegistered
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: Subdomain
    network: mainnet
    source:
      address: "0x901B20472988Db08F96acd1Ddcfc89E9dAfDEA7a"
      abi: IPNS
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.4
      language: wasm/assemblyscript
      entities:
        - Subdomain
      abis:
        - name: IPNS
          file: ./build/contracts/IPNS.json
      eventHandlers:
        - event: NewSubnameOwner(uint256,string,address)
          handler: handleNewSubnameOwner
      file: ./src/mapping.ts